<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NN-Photo-Frames Login Page</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link
        href="https://fonts.googleapis.com/css2?family=Chelsea+Market&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Oldenburg&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">

</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow-x: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100vh;
       background: linear-gradient(134deg,rgb(0, 0, 0),rgba(0, 0, 0, 0.945),rgb(0, 0, 0));
    }

    .loginpage {
        border: 1px solid red;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);

        border: 1px solid rgba(255, 255, 255, 0.18);

        box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.25),
            inset 0 1px 1px rgba(255, 255, 255, 0.25);

        border-radius: 20px;
        max-width: 300px;
        width: 100%;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 0px;
    }

    .loginpage img {
        width: 180px;
    }

    .sideline {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 5px;
        margin: 20px 0;
    }

    .sideline::after {
        content: "";
        width: 70px;
        height: 2px;
        background: linear-gradient(145deg, red, transparent);
    }

    .sideline::before {
        content: "";
        width: 70px;
        height: 2px;
        background: linear-gradient(145deg, transparent, red);
    }

    .sideline span {
        font-size: 13px;
    }

    .loginpage>p {
        max-width: 250px;
        text-align: center;
        line-height: 1.2;
        font-size: 15px;
        margin-bottom: 10px;
        color: white;
    }

    .footer-login {
        text-align: center;
    }

    .footer-login a {
        text-decoration: none;
        color: purple;
        font-size: 14px;
    }


    .footer-login p {
        font-size: 14px;
    }

    .footer-link {
        display: flex;
        gap: 15px;
        margin-bottom: 5px;
    }

    .formbox {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 10px;
    }


    .inputbox {
        position: relative;
        display: flex;
        align-items: center;
    }

    .inputbox input,
    .selectrole {
        width: 100%;
        padding: 10px 20px;
        border-radius: 7px;

    }

    .inputbox span {
        position: absolute;
        font-size: 20px;
        right: 20px;
    }

    .sub-btn {
        display: flex;
        width: 100%;
        padding: 5px 10px;
        align-items: center;
        justify-content: center;
        gap: 5px;
        border-radius: 5px;
    }
</style>

<body>
    <section class="loginpage">
        <img src="./src/logo.webp" alt="company Logo">

        <div class="sideline">
            <span class="material-symbols-outlined">photo_prints</span>
        </div>

        <p>secure accesssfor formers , form Managers,
            and organic Produce Partners</p>

        <form>
            <div class="formbox">
                <label for="role">Select User Type</label>

                <div class="inputbox">
                    <select name="Role" id="role" class="selectrole">
                        <option value="">Select Your rold</option>
                        <option value="Admin">Admin</option>
                        <option value="Client">Client</option>
                    </select>
                </div>
            </div>

            <div class="formbox">
                <label for="email">Email</label>

                <div class="inputbox">
                    <input type="email" placeholder="enter Your Email" id="email">
                    <span class="material-symbols-outlined">mail</span>
                </div>
            </div>

            <div class="formbox">
                <label for="password">Password</label>

                <div class="inputbox">
                    <input type="password" placeholder="Enter Your Password">
                    <span class="material-symbols-outlined">visibility</span>
                </div>
            </div>

            <button class="sub-btn"><span class="material-symbols-outlined">send</span>Submit Request</button>

        </form>

        <div class="sideline">
            <span class="line1"></span>
            <span class="material-symbols-outlined">photo_prints</span>
            <span class="line2"></span>
        </div>


        <div class="footer-login">
            <div class="footer-link">
                <p>New Accout?</p><a href="">Register Accout</a>
            </div>

            <a href="">Forgot Password?</a>
        </div>



    </section>
</body>

</html>
