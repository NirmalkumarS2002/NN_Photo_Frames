<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NN-Photo-Frames Login Page</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link
        href="https://fonts.googleapis.com/css2?family=Chelsea+Market&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Oldenburg&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">

</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow-x: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100vh;
        background: linear-gradient(134deg, rgb(0, 0, 0), rgba(0, 0, 0, 0.945), rgb(0, 0, 0));
    }

    .loginpage {
        border: 1px solid red;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);

        border: 1px solid rgba(255, 255, 255, 0.18);

        box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.25),
            inset 0 1px 1px rgba(255, 255, 255, 0.25);

        border-radius: 20px;
        max-width: 300px;
        width: 100%;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 0px;
        position: relative;
        background: #000;
        overflow: hidden;

    }



    .loginpage img {
        width: 180px;
    }

    .sideline {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 5px;
        margin: 20px 0;
    }

    .sideline::after {
        content: "";
        width: 70px;
        height: 2px;
        background: linear-gradient(145deg, rgb(255, 255, 255), transparent);
    }

    .sideline::before {
        content: "";
        width: 70px;
        height: 2px;
        background: linear-gradient(145deg, transparent, rgb(255, 255, 255));
    }

    .sideline span {
        font-size: 12px;
        color: white;
    }

    .formbox label {
        color: purple;
    }

    .loginpage>p {
        max-width: 250px;
        text-align: center;
        line-height: 1.2;
        font-size: 15px;
        margin-bottom: 10px;
        color: white;
    }

    .footer-login {
        text-align: center;
    }

    .footer-login a {
        text-decoration: none;
        color: purple;
        font-size: 14px;
    }


    .footer-login p {
        font-size: 14px;
        color: white;
    }

    .footer-link {
        display: flex;
        gap: 15px;
        margin-bottom: 5px;
    }

    .formbox {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 10px;
    }


    .inputbox {
        position: relative;
        display: flex;
        align-items: center;
    }

    .inputbox input,
    .role {
        width: 100%;
        padding: 10px 20px;
        border-radius: 7px;
        border: none;

    }

    .inputbox span {
        position: absolute;
        font-size: 20px;
        right: 20px;
    }

    .sub-btn {
        display: flex;
        width: 100%;
        padding: 5px 10px;
        align-items: center;
        justify-content: center;
        gap: 5px;
        border-radius: 5px;
        border: none;
    }
</style>

<body>
    <section class="loginpage">
        <img src="./src/logo.webp" alt="company Logo">

        <div class="sideline">
            <span class="material-symbols-outlined">photo_prints</span>
        </div>

        <p>secure accesssfor formers , form Managers,
            and organic Produce Partners</p>

        <form>
            <div class="formbox">
                <label for="role">Select User Type</label>

                <div class="inputbox">
                    <select name="Role" class="role" id="selectrole">
                        <option value="">Select Your rold</option>
                        <option value="Admin">Admin</option>
                        <option value="Client">Client</option>
                    </select>
                </div>
            </div>

            <div class="formbox">
                <label for="email">Email</label>

                <div class="inputbox">
                    <input type="email" placeholder="enter Your Email" id="email">
                    <span class="material-symbols-outlined">mail</span>
                </div>
            </div>

            <div class="formbox">
                <label for="email">Name</label>

                <div class="inputbox">
                    <input type="text" placeholder="enter Your Name" id="text">
                    <span class="material-symbols-outlined">mail</span>
                </div>
            </div>

            <div class="formbox">
                <label for="email">no</label>

                <div class="inputbox">
                    <input type="number" placeholder="enter Your Name"  maxlength="10" id="number">
                    <span class="material-symbols-outlined">mail</span>
                </div>
            </div>

            <div class="formbox">
                <label for="password">Password</label>

                <div class="inputbox">
                    <input type="password" placeholder="Enter Your Password" id="password">
                    <span class="material-symbols-outlined passeye">visibility</span>
                </div>
                <div class="inputbox">
                    <input type="password" placeholder="Enter Your Password" id="confirmpassword">
                    <span class="material-symbols-outlined passeye">visibility</span>
                </div>
            </div>

            <button type="submit" class="sub-btn"><span class="material-symbols-outlined">send</span>Submit
                Request</button>

        </form>

        <div class="sideline">
            <span class="line1"></span>
            <span class="material-symbols-outlined">photo_prints</span>
            <span class="line2"></span>
        </div>


        <div class="footer-login">
            <div class="footer-link">
                <p>New Accout?</p><a href="">Register Accout</a>
            </div>

            <a href="">Forgot Password?</a>
        </div>



    </section>

    <script>



        //login form validation

        const form = document.querySelector("form")
        const selectrole = document.getElementById("selectrole");
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const conpass = document.querySelector("#confirmpassword");
        const text = document.querySelector("#text")
        const number=document.querySelector("#number")

        text.addEventListener("input", () => {
            text.value = text.value.replace(/[^A-Za-z\s]/g, "");
        });

        form.addEventListener("submit", (e) => {
            e.preventDefault();


            const role = selectrole.value.trim();
            const semail = email.value.trim();
            const spassword = password.value.trim();
            const conp = conpass.value.trim();
            const tex = text.value.trim();
            const num=number.value.trim();

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
            const nameRegex = /^[A-Za-z]+$/
            const numRegex =/^[0-9]+$/


            if (role === "") {
                alert("please select your")
                selectrole.focus();
                return;
            }

            if (semail === "") {
                alert("enter Your email")
                email.focus()
                return;
            }

            if (!emailRegex.test(semail)) {
                alert("please  enter valid mail")
                email.focus()
                return;
            }



            if (tex == "") {
                alert("enter Your Name")
                text.focus();
                return;
            }

            if(num == ""){
                alert("enter Yr Number")
                number.focus();
                return;
            }

            
            if(!numRegex.test(num)){
                alert("number contains no only")
                number.focus();
                return;
            }

            if(num.length>10){
                alert("number must be in 10 char")
                return;
            }



            if (spassword === "") {
                alert("enter your Password")
                password.focus()
                return;
            }

            if (spassword.length < 6) {
                alert("password must be in 6 chars")
                password.focus()
                return;
            }

            if (conp === "") {
                alert("enter your conform password")
                conpass.focus();
                return;
            }

            if (spassword !== conp) {
                alert("password and confirm password must be same")
                return;
            }


            localStorage.setItem("userEmail", semail);
            if (role === "Admin") {
                window.location.href = "admin.html"
                return;
            }

            if (role === "Client") {
                window.location.href = "client.html"
                return;
            }


        })

        //pass eye
        const eye = document.querySelectorAll(".passeye")

        eye.forEach((item) => {
            item.addEventListener("click", () => {


                const input = item.previousElementSibling;

                if (input.type === "password") {
                    item.textContent = "visibility_off"
                    input.type = "text"
                }

                else {
                    item.textContent = "visibility"
                    input.type = "password"
                }

            })
        })

    </script>
</body>

</html>
